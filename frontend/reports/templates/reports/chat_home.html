{% extends "base.html" %}
{% load static %}

{% block body_class %}chat-home-page{% endblock %}

{% block content %}
<div class="main-chat-container">
    <div class="chat-header">
        <h2>上海大学智能采购助手</h2>
        <p>支持多智能体检索、分析与报告生成</p>
    </div>

    <div id="chat-box" class="chat-box">
        <div class="message ai-message">
            <div class="avatar">🤖</div>
            <div class="content">
                你好！我是采购系统多智能体助手。你可以直接向我提问，例如：“帮我分析一下最近的服务器采购趋势”，我将为你进行深度的 RAG 分析并生成调查报告。
            </div>
        </div>
    </div>

    <div class="input-section">
        <div id="file-preview-container" class="file-preview-container" style="display: none;">
            <div class="file-badge">
                <span id="file-name">filename.pdf</span>
                <button onclick="removeFile()" class="remove-file-btn">×</button>
            </div>
        </div>

        <div class="input-wrapper">
            <input type="file" id="file-upload" style="display: none;" onchange="handleFileSelect(event)">

            <button class="icon-btn" onclick="document.getElementById('file-upload').click()" title="上传文件">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
            </button>

            <textarea id="user-input" rows="1" placeholder="输入采购问题，例如：帮我总结这个项目潜在的供应商有哪些？" oninput="autoResize(this)"></textarea>

            <button id="send-btn" class="icon-btn send-btn" onclick="sendMessage()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
            </button>
        </div>
        <div class="disclaimer">内容由 Multi-Agent 生成，输入需求后将进入深度思考与联想分析阶段。</div>
    </div>
</div>

<style>
    /* 页面整体布局：隐藏多余滚动条，适配全屏 */
    body, html { margin: 0; padding: 0; height: 100%; background-color: #ffffff; }

    .main-chat-container {
        display: flex; flex-direction: column;
        max-width: 800px; margin: 0 auto;
        height: calc(100vh - 60px); /* 减去顶部导航栏高度，按需调整 */
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .chat-header { text-align: center; padding: 20px 0; border-bottom: 1px solid #f0f0f0; }
    .chat-header h2 { margin: 0; font-size: 20px; color: #333; }
    .chat-header p { margin: 5px 0 0; font-size: 13px; color: #666; }

    /* 聊天区样式 */
    .chat-box { flex: 1; overflow-y: auto; padding: 30px 20px; display: flex; flex-direction: column; gap: 24px; }

    .message { display: flex; gap: 16px; max-width: 90%; }
    .message.user-message { align-self: flex-end; flex-direction: row-reverse; }
    .message .avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; background: #f0f4f9; }
    .message.user-message .avatar { background: #1a73e8; color: white; font-size: 16px; }
    .message .content { background-color: #f0f4f9; padding: 14px 18px; border-radius: 16px; line-height: 1.6; color: #1f1f1f; font-size: 15px; }
    .message.user-message .content { background-color: #e8f0fe; }

    /* 生成完毕后的“了解更多”引导提示样式 */
    .action-prompt {
        background: #fff; border: 1px solid #e0e0e0;
        padding: 12px 20px; border-radius: 12px; font-size: 14px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-top: 10px;
        display: inline-block;
    }
    .action-prompt a { color: #1a73e8; text-decoration: none; font-weight: bold; margin-left: 5px;}
    .action-prompt a:hover { text-decoration: underline; }

    /* 输入区样式 */
    .input-section { padding: 20px; background: white; }
    .file-preview-container { margin-bottom: 10px; padding-left: 10px; }
    .file-badge { display: inline-flex; align-items: center; background: #f1f3f4; padding: 6px 12px; border-radius: 16px; font-size: 13px; color: #333; border: 1px solid #ddd; }
    .remove-file-btn { background: none; border: none; margin-left: 8px; cursor: pointer; color: #999; font-weight: bold; }
    .remove-file-btn:hover { color: #d32f2f; }

    .input-wrapper { display: flex; align-items: flex-end; background-color: #f0f4f9; border-radius: 24px; padding: 8px 12px; gap: 8px; }

    .icon-btn { background: transparent; border: none; cursor: pointer; padding: 10px; color: #5f6368; display: flex; align-items: center; justify-content: center; border-radius: 50%; transition: background 0.2s; }
    .icon-btn:hover { background-color: rgba(0,0,0,0.05); }
    .icon-btn svg { width: 22px; height: 22px; }
    .send-btn { color: #1a73e8; }
    .send-btn:disabled { color: #ccc; cursor: not-allowed; }

    textarea { flex: 1; border: none; background: transparent; resize: none; outline: none; padding: 10px 0; font-size: 16px; line-height: 1.5; max-height: 150px; font-family: inherit; }
    .disclaimer { text-align: center; font-size: 12px; color: #5f6368; margin-top: 12px; }
</style>

<script>
    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    let currentFile = null;

    // 1. 页面加载时执行：检查 URL 是否带有刚刚生成的报告 ID
    document.addEventListener("DOMContentLoaded", function() {
        const urlParams = new URLSearchParams(window.location.search);
        const newReportId = urlParams.get('new_report_id');

        // 如果是从 ai_analysis.html 成功生成报告后跳回来的
        if (newReportId) {
            const msgHtml = `
                <div class="message ai-message">
                    <div class="avatar">🤖</div>
                    <div class="content">
                        多智能体已完成深度调研与检索！您的专属报告生成完毕。
                        <div class="action-prompt">
                            💡 <a href="/reports/${newReportId}/">点击这里查看完整多维度分析报告 →</a>
                        </div>
                    </div>
                </div>
            `;
            chatBox.insertAdjacentHTML('beforeend', msgHtml);

            // 清理地址栏（去掉 ?new_report_id=xxx），防止用户刷新页面重复弹出提示
            window.history.replaceState({}, document.title, window.location.pathname);

            // 滚动到底部
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    });

    // 自动拉伸输入框
    function autoResize(textarea) {
        textarea.style.height = 'auto';
        textarea.style.height = textarea.scrollHeight + 'px';
    }

    // 回车发送 (支持 Shift+回车 换行)
    userInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    // 处理文件选择 (仅做 UI 交互展示)
    function handleFileSelect(event) {
        const file = event.target.files[0];
        if (file) {
            currentFile = file;
            document.getElementById('file-name').innerText = file.name;
            document.getElementById('file-preview-container').style.display = 'block';
        }
    }

    // 移除已选文件
    function removeFile() {
        currentFile = null;
        document.getElementById('file-upload').value = '';
        document.getElementById('file-preview-container').style.display = 'none';
    }

    // 2. 核心逻辑：用户发送消息后，直接跳转至分析加载页
    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text && !currentFile) return;

        let displayMsg = text;
        if (currentFile) {
            displayMsg = `[已附加文件: ${currentFile.name}] <br>` + text;
        }
        appendMessage(displayMsg, 'user-message', '👤');

        userInput.value = '';
        userInput.style.height = 'auto';
        sendBtn.disabled = true;

        let fileId = ''; // 用来存后端返回的文件标识

        // 1. 如果有文件，先执行异步上传
        if (currentFile) {
            const loadingId = 'uploading-' + Date.now();
            appendMessage('<span class="typing-indicator">正在安全上传文件给智能体...</span>', 'ai-message', '🤖', loadingId);

            const formData = new FormData();
            formData.append('file', currentFile);

            try {
                const uploadRes = await fetch('/api/upload-temp/', {
                    method: 'POST',
                    body: formData
                });
                const uploadData = await uploadRes.json();

                if (uploadData.success) {
                    fileId = uploadData.file_id; // 拿到后端给的 file_id
                } else {
                    console.error("文件上传失败");
                }
                document.getElementById(loadingId).remove();
            } catch (error) {
                console.error("上传出错", error);
                document.getElementById(loadingId).remove();
            }
        }

        // 2. 拼接 URL 并跳转到动画页
        let redirectUrl = `/reports/ai-analysis/?query=${encodeURIComponent(text)}`;
        if (fileId) {
            // 如果上传了文件，就把 file_id 带过去
            redirectUrl += `&file_id=${encodeURIComponent(fileId)}`;
        }

        window.location.href = redirectUrl;
    }
    function appendMessage(content, className, avatarChar) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${className}`;
        messageDiv.innerHTML = `<div class="avatar">${avatarChar}</div><div class="content">${content}</div>`;
        chatBox.appendChild(messageDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>
{% endblock %}
